spring:
  application:
    name: order-service
  datasource:
    url: jdbc:postgresql://localhost:5435/flexpay_order
    username: flexpay
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8082

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/
